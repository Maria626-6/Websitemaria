# version: '3.8'

services:
  # ==========================================
  # 1. BACKEND (Node.js + Express + SQLite)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: portfolio_backend
    restart: unless-stopped
    environment:
      SQLITE_DB_PATH: /app/data/portfolio.db
      INIT_SQL_PATH: /app/database/init.sql
      PORT: 3001
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_TO: ${EMAIL_TO}
    volumes:
      - ./database:/app/data
    ports:
      - "3001:3001"
    networks:
      - portfolio_network

  # ==========================================
  # 2. FRONTEND
  # ==========================================
  frontend:
    build: ./frontend
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge
