# version: '3.8'

services:
  # ==========================================
  # 1. BACKEND (Node.js + Express)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: portfolio_backend
    restart: unless-stopped
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - portfolio_network

  # ==========================================
  # 2. FRONTEND
  # ==========================================
  frontend:
    build: ./frontend
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge
